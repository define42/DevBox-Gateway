name: govulncheck

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  schedule:
    # Weekly run on Mondays at 07:23 UTC to surface new advisories that
    # may affect a tagged release even when no code changes land.
    - cron: '23 7 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev   qemu-kvm  libvirt-daemon-system  libvirt-clients
          sudo bash -c 'cat >>/etc/libvirt/qemu.conf <<EOF
          user = "root"
          group = "root"
          dynamic_ownership = 0
          security_driver = "none"
          security_default_confined = 0
          EOF'
          sudo systemctl enable --now libvirtd
          sudo systemctl start libvirtd
          sudo chmod 777 /var/run/libvirt/libvirt-sock
          sudo chmod 777 /var/lib/libvirt/images/
          sudo virsh -c qemu:///system pool-info default || \
            sudo virsh -c qemu:///system pool-define-as default dir --target /var/lib/libvirt/images
          sudo virsh -c qemu:///system pool-start default
          sudo virsh -c qemu:///system pool-autostart default
          sudo systemctl restart libvirtd || true
          sudo systemctl restart virtqemud || true
          sudo systemctl restart virtstoraged || true

      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false
