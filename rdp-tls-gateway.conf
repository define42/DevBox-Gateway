# rdp-tls-gateway configuration file.
#
# The gateway reads this file on startup (default
# /etc/rdp-tls-gateway/rdp-tls-gateway.conf, override with the CONFIG_FILE
# environment variable). Each line is KEY=VALUE; '#' starts a comment.
#
# Every setting below is optional; the value shown is the built-in default. A
# matching environment variable, if set, takes precedence over the file value.
# Uncomment and edit the lines you want to change, then restart the service:
#   systemctl restart rdp-tls-gateway
#
# See https://github.com/define42/rdp-tls-gateway for full documentation.

# --- Listener / TLS (front side, facing clients) ---
#LISTEN_ADDR=:443
#CERT_FILE=
#KEY_FILE=
#FRONT_DOMAIN=desktop.local.gd
#TIMEOUT=10s

# --- ACME / Let's Encrypt (automatic public certificates) ---
#ACME_ENABLE=false
#ACME_EMAIL=
#ACME_CA=

# --- Storage / libvirt ---
#DATA_ROOT_DIR=/data
#VIRT_STORAGE_POOL_NAME=desktop
# Directory of selectable base VDI images (.img/.qcow2/.raw); must contain at
# least one image at boot. Empty -> <DATA_ROOT_DIR>/baseimages
#BASE_IMAGE_DIR=

# --- LDAP authentication ---
#LDAP_URL=ldaps://ldap:389
#LDAP_BASE_DN=dc=glauth,dc=com
#LDAP_USER_FILTER=(mail=%s)
#LDAP_USER_DOMAIN=@example.com
#LDAP_STARTTLS=false
#LDAP_SKIP_TLS_VERIFY=true

# --- RDP session hardening ---
#RDP_DISABLE_CLIPBOARD=false
#RDP_DISABLE_DRIVES=false

# --- SNI routing secret (auto-generated and persisted when empty) ---
#SNI_HASH_SECRET=
